name: verify

# The registry's trust model, in CI: every PR re-proves the touched entries;
# every night re-proves ALL entries (catches upstream drift — a vanished
# source rev or a force-push turns the board red). Read-only · no secrets.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '43 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reprove:
    name: re-prove entries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: supernovae-st/nika-spec
          path: .oracle
          fetch-depth: 0   # SPEC_PIN's commit must be reachable (git show <rev>)
      - name: Oracle deps
        run: pip install pyyaml jsonschema
      - name: First-party entries match the spec pack (projection parity)
        env:
          NIKA_SPEC_DIR: ${{ github.workspace }}/.oracle
        run: python3 scripts/project_pack.py --check
      # PR/push runs resolve sources OFFLINE from the .oracle checkout —
      # deterministic and CDN-flake-free for contributors, and stricter on
      # one class: a force-pushed-away commit vanishes from a fresh clone
      # while the CDN may still serve it. The nightly run keeps the real
      # consumer path (raw.githubusercontent) as the availability probe.
      - name: Source resolution mode
        id: mode
        run: |
          ln -s .oracle nika-spec
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "offline_root=" >> "$GITHUB_OUTPUT"
            echo "mode: NETWORK (nightly · the consumer path)"
          else
            echo "offline_root=${{ github.workspace }}" >> "$GITHUB_OUTPUT"
            echo "mode: OFFLINE (PR/push · the .oracle checkout)"
          fi

      - name: Gate guards hold (security regressions)
        run: python3 scripts/selftest.py

      - name: Re-prove every entry
        env:
          NIKA_SPEC_DIR: ${{ github.workspace }}/.oracle
          OFFLINE_ROOT: ${{ steps.mode.outputs.offline_root }}
        run: python3 scripts/verify.py --all

      - name: Fetch the pinned engine (digest-verified — we practice what we gate)
        run: |
          curl -sSLo nika.tar.gz https://github.com/supernovae-st/nika/releases/download/v0.102.0/nika-linux-x64-0.102.0.tar.gz
          echo "bb0739ea823d560fd01964e41aeaf5c03d36109b8bb9ab0bb4dba14eab8b443f  nika.tar.gz" | sha256sum -c -
          tar xzf nika.tar.gz

      - name: Certs + catalog in sync (the engine's own analysis, re-proven)
        env:
          NIKA_BIN: ${{ github.workspace }}/nika
          OFFLINE_ROOT: ${{ steps.mode.outputs.offline_root }}
        run: python3 scripts/cert.py --check

      - name: Index + llms.txt + badges in sync
        run: python3 scripts/index.py --check
      - name: Advisories parse + reference real entries
        run: |
          python3 - << 'EOF'
          import pathlib, sys, tomllib
          root = pathlib.Path(".")
          for p in root.glob("advisories/*.toml"):
              a = tomllib.loads(p.read_text())
              for f in ("id", "published", "severity", "affected", "versions", "summary", "action"):
                  assert f in a, f"{p}: missing {f}"
              assert (root / "registry" / a["affected"]).is_dir(), f"{p}: unknown artifact {a['affected']}"
          print("advisories OK")
          EOF
